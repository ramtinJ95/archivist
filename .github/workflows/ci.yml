name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests
        run: go test ./...

      - name: Build CLI
        run: go build ./cmd/archivist

      - name: Validate GoReleaser config
        run: go run github.com/goreleaser/goreleaser/v2@latest check --config .goreleaser.yaml
