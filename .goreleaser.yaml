version: 2

project_name: archivist

before:
  hooks:
    - go test ./...

builds:
  - id: archivist
    main: ./cmd/archivist
    binary: archivist
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/ramtinJ95/archivist/internal/cli.Version={{ .Version }}

archives:
  - id: archivist
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: git

release:
  github:
    owner: ramtinJ95
    name: archivist
